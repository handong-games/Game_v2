<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111317"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0" y1="0" x2="0" y2="298" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D2B32"/>
      <stop offset="1" stop-color="#151419"/>
    </linearGradient>
    <linearGradient id="portrait" x1="0" y1="0" x2="0" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#565A66"/>
      <stop offset="1" stop-color="#2E3038"/>
    </linearGradient>
    <linearGradient id="hp" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B62E33"/>
      <stop offset="1" stop-color="#E4584B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="640" y="70" fill="#E8E1D6" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" text-anchor="middle">Card Health Overlay Concepts</text>
  <text x="640" y="100" fill="#8E95A3" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">All variants keep HP outside the card and above the frame.</text>

  <!-- Concept A -->
  <g transform="translate(150 150)" filter="url(#softShadow)">
    <text x="100" y="-42" fill="#E8E1D6" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle">A. Slim Bar</text>
    <g transform="translate(10 -22)">
      <rect x="0" y="0" width="180" height="10" rx="5" fill="#0A0B0D" stroke="#332E30" stroke-width="1"/>
      <rect x="2" y="2" width="126" height="6" rx="3" fill="url(#hp)"/>
    </g>
    <rect x="0" y="0" width="200" height="298" rx="8" fill="url(#cardFace)" stroke="#8D7652" stroke-width="4"/>
    <rect x="18" y="28" width="164" height="210" rx="4" fill="url(#portrait)" stroke="#4E4B54" stroke-width="2"/>
    <rect x="30" y="252" width="140" height="22" rx="3" fill="#0D0E11" opacity="0.85"/>
  </g>

  <!-- Concept B -->
  <g transform="translate(540 150)" filter="url(#softShadow)">
    <text x="100" y="-52" fill="#E8E1D6" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle">B. Capsule HP</text>
    <g transform="translate(-3 -34)">
      <rect x="0" y="0" width="206" height="24" rx="12" fill="#090A0C" stroke="#4A3838" stroke-width="1.5"/>
      <rect x="6" y="6" width="134" height="12" rx="6" fill="url(#hp)"/>
      <text x="103" y="17" fill="#FFF0E5" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">34 / 50</text>
    </g>
    <rect x="0" y="0" width="200" height="298" rx="8" fill="url(#cardFace)" stroke="#8D7652" stroke-width="4"/>
    <rect x="18" y="28" width="164" height="210" rx="4" fill="url(#portrait)" stroke="#4E4B54" stroke-width="2"/>
    <rect x="30" y="252" width="140" height="22" rx="3" fill="#0D0E11" opacity="0.85"/>
  </g>

  <!-- Concept C -->
  <g transform="translate(930 150)" filter="url(#softShadow)">
    <text x="100" y="-70" fill="#E8E1D6" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle">C. Status Plate</text>
    <g transform="translate(-10 -52)">
      <path d="M16 0H194L210 15L194 34H16L0 15L16 0Z" fill="#0A0B0E" stroke="#6D5842" stroke-width="1.5"/>
      <text x="105" y="14" fill="#DED6CA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">MONSTER</text>
      <rect x="22" y="20" width="166" height="8" rx="4" fill="#2D1719"/>
      <rect x="22" y="20" width="116" height="8" rx="4" fill="url(#hp)"/>
      <text x="105" y="30" fill="#FFF0E5" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">34 / 50</text>
    </g>
    <rect x="0" y="0" width="200" height="298" rx="8" fill="url(#cardFace)" stroke="#8D7652" stroke-width="4"/>
    <rect x="18" y="28" width="164" height="210" rx="4" fill="url(#portrait)" stroke="#4E4B54" stroke-width="2"/>
    <rect x="30" y="252" width="140" height="22" rx="3" fill="#0D0E11" opacity="0.85"/>
  </g>

  <g transform="translate(125 535)">
    <rect x="0" y="0" width="1030" height="96" rx="10" fill="#0B0D10" stroke="#23262D"/>
    <text x="26" y="34" fill="#D5D0C8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Comparison Notes</text>
    <text x="26" y="62" fill="#9AA2AD" font-family="Segoe UI, Arial, sans-serif" font-size="14">A: cleanest, but weak exact HP readability.</text>
    <text x="365" y="62" fill="#9AA2AD" font-family="Segoe UI, Arial, sans-serif" font-size="14">B: best combat readability with low visual weight.</text>
    <text x="720" y="62" fill="#9AA2AD" font-family="Segoe UI, Arial, sans-serif" font-size="14">C: strongest identity, but competes with card art.</text>
  </g>
</svg>
