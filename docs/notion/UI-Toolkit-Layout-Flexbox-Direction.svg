<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <title>방향</title>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="74" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">방향</text>
  <text x="640" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">flex-direction 값에 따라 자식 요소가 가로 또는 세로로 쌓인다.</text>

  <rect x="110" y="170" width="470" height="420" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/>
  <rect x="700" y="170" width="470" height="420" rx="24" fill="#f0fdf4" stroke="#4ade80" stroke-width="3"/>
  <text x="345" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">row</text>
  <text x="935" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#166534">column</text>

  <rect x="175" y="320" width="100" height="110" rx="16" fill="#bfdbfe" stroke="#3b82f6" stroke-width="3"/>
  <rect x="295" y="320" width="100" height="110" rx="16" fill="#c7d2fe" stroke="#6366f1" stroke-width="3"/>
  <rect x="415" y="320" width="100" height="110" rx="16" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="3"/>

  <rect x="885" y="255" width="100" height="90" rx="16" fill="#bbf7d0" stroke="#22c55e" stroke-width="3"/>
  <rect x="885" y="365" width="100" height="90" rx="16" fill="#86efac" stroke="#16a34a" stroke-width="3"/>
  <rect x="885" y="475" width="100" height="90" rx="16" fill="#4ade80" stroke="#15803d" stroke-width="3"/>

  <line x1="170" y1="470" x2="520" y2="470" stroke="#1e293b" stroke-width="4"/>
  <polygon points="520,470 500,460 500,480" fill="#1e293b"/>
  <text x="345" y="505" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1e293b">왼쪽에서 오른쪽으로 배치</text>

  <line x1="1040" y1="260" x2="1040" y2="560" stroke="#1e293b" stroke-width="4"/>
  <polygon points="1040,560 1030,540 1050,540" fill="#1e293b"/>
  <text x="1088" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1e293b">위에서 아래로 배치</text>

  <rect x="225" y="628" width="830" height="46" rx="12" fill="#e2e8f0"/>
  <text x="640" y="657" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">같은 구조라도 row와 column은 정보가 읽히는 흐름을 다르게 만든다.</text>
</svg>
