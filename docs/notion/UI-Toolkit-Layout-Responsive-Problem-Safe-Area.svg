<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">반응형 문제: Safe Area 충돌</title>
  <desc id="desc">노치와 홈 인디케이터 safe area와 UI가 충돌하는 문제를 보여주는 개발자용 시각 자료.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .title { fill: #111827; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .frame { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .safe { fill: #dbeafe; opacity: 0.65; }
      .unsafe { fill: #fecaca; opacity: 0.8; }
      .label { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .panel { fill: #ffffff; stroke: #93c5fd; stroke-width: 1.5; }
      .button { fill: #ddd6fe; stroke: #7c3aed; stroke-width: 1.5; }
      .text { fill: #0f172a; font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .bad { fill: #dc2626; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .caption { fill: #475569; font-family: Arial, sans-serif; font-size: 15px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" width="960" height="540" />
  <text class="title" x="48" y="54">문제 6. UI가 Safe Area를 무시함</text>

  <rect class="frame" x="64" y="96" width="384" height="360" rx="12" />
  <text class="label" x="92" y="130">의도한 상태</text>
  <rect class="screen" x="164" y="154" width="184" height="248" rx="18" />
  <rect class="unsafe" x="226" y="154" width="60" height="18" rx="8" />
  <rect class="safe" x="182" y="182" width="148" height="182" rx="10" />
  <rect class="panel" x="198" y="204" width="116" height="120" rx="10" />
  <rect class="button" x="216" y="224" width="80" height="24" rx="8" />
  <rect class="button" x="216" y="274" width="80" height="24" rx="8" />
  <text class="text" x="236" y="240">버튼</text>
  <text class="text" x="236" y="290">버튼</text>
  <text class="caption" x="100" y="432">콘텐츠가 안전 영역 안에 유지된다.</text>

  <rect class="frame" x="512" y="96" width="384" height="360" rx="12" />
  <text class="label" x="540" y="130">노치 화면에서 깨진 상태</text>
  <rect class="screen" x="612" y="154" width="184" height="248" rx="18" />
  <rect class="unsafe" x="674" y="154" width="60" height="18" rx="8" />
  <rect class="unsafe" x="612" y="362" width="184" height="26" rx="0" />
  <rect class="panel" x="628" y="168" width="152" height="184" rx="10" />
  <rect class="button" x="646" y="168" width="116" height="24" rx="8" />
  <rect class="button" x="646" y="338" width="116" height="24" rx="8" />
  <text class="text" x="680" y="184">버튼</text>
  <text class="text" x="680" y="354">버튼</text>
  <text class="bad" x="540" y="252">노치에 가림</text>
  <text class="bad" x="540" y="282">홈 영역에 가림</text>
  <text class="caption" x="540" y="432">기기 안전 영역을 무시하면 UI 일부가 가려진다.</text>
</svg>
