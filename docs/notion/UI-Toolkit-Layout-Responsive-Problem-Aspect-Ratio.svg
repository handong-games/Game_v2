<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">반응형 문제: 종횡비가 바뀌면 같은 레이아웃이 비효율적임</title>
  <desc id="desc">화면 종횡비가 바뀌었을 때 같은 레이아웃이 비효율적으로 보이는 문제를 보여주는 개발자용 시각 자료.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .title { fill: #111827; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .frame { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .label { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .panel { fill: #ffffff; stroke: #93c5fd; stroke-width: 1.5; }
      .boxA { fill: #bfdbfe; stroke: #2563eb; stroke-width: 1.5; }
      .boxB { fill: #c7d2fe; stroke: #4f46e5; stroke-width: 1.5; }
      .text { fill: #0f172a; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .bad { fill: #dc2626; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .caption { fill: #475569; font-family: Arial, sans-serif; font-size: 15px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" width="960" height="540" />
  <text class="title" x="48" y="54">문제 4. 하나의 레이아웃이 모든 종횡비에 맞지 않음</text>

  <rect class="frame" x="64" y="96" width="384" height="360" rx="12" />
  <text class="label" x="92" y="130">세로형 화면에 맞는 상태</text>
  <rect class="screen" x="180" y="154" width="152" height="248" rx="12" />
  <rect class="panel" x="204" y="182" width="104" height="188" rx="10" />
  <rect class="boxA" x="222" y="208" width="68" height="48" rx="8" />
  <rect class="boxB" x="222" y="276" width="68" height="72" rx="8" />
  <text class="text" x="238" y="236">상단</text>
  <text class="text" x="233" y="316">목록</text>
  <text class="caption" x="100" y="432">세로 스택은 세로형 비율에 잘 맞는다.</text>

  <rect class="frame" x="512" y="96" width="384" height="360" rx="12" />
  <text class="label" x="540" y="130">가로형 화면에서 비효율적</text>
  <rect class="screen" x="540" y="210" width="328" height="136" rx="12" />
  <rect class="panel" x="656" y="174" width="96" height="208" rx="10" />
  <rect class="boxA" x="670" y="204" width="68" height="42" rx="8" />
  <rect class="boxB" x="670" y="266" width="68" height="72" rx="8" />
  <text class="text" x="686" y="229">상단</text>
  <text class="text" x="681" y="307">목록</text>
  <text class="bad" x="540" y="258">옆 공간</text>
  <text class="bad" x="540" y="288">낭비</text>
  <text class="caption" x="540" y="432">같은 세로형 스택은 가로형 화면에서 답답해진다.</text>
</svg>
