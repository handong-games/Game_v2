<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">반응형 문제: 텍스트 잘림과 넘침</title>
  <desc id="desc">제한된 화면에서 긴 텍스트가 컨테이너를 넘치거나 잘리는 문제를 보여주는 개발자용 시각 자료.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .title { fill: #111827; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .frame { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .label { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .field { fill: #ffffff; stroke: #93c5fd; stroke-width: 1.5; }
      .text { fill: #0f172a; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .long { fill: #0f172a; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .cut { fill: #dc2626; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .bad { fill: #dc2626; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .caption { fill: #475569; font-family: Arial, sans-serif; font-size: 15px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" width="960" height="540" />
  <text class="title" x="48" y="54">문제 2. 텍스트가 잘리거나 넘침</text>

  <rect class="frame" x="64" y="96" width="384" height="360" rx="12" />
  <text class="label" x="92" y="130">의도한 상태</text>
  <rect class="screen" x="100" y="154" width="312" height="248" rx="12" />
  <rect class="field" x="132" y="210" width="248" height="52" rx="10" />
  <text class="text" x="154" y="241">퀘스트 보상</text>
  <rect class="field" x="132" y="292" width="248" height="52" rx="10" />
  <text class="text" x="154" y="323">인벤토리 열기</text>
  <text class="caption" x="100" y="432">텍스트가 컨테이너 안에 맞게 들어간다.</text>

  <rect class="frame" x="512" y="96" width="384" height="360" rx="12" />
  <text class="label" x="540" y="130">긴 텍스트에서 깨진 상태</text>
  <rect class="screen" x="634" y="154" width="140" height="248" rx="12" />
  <rect class="field" x="650" y="210" width="108" height="52" rx="10" />
  <text class="long" x="662" y="241">퀘스트 보상 상세 정보</text>
  <rect class="field" x="650" y="292" width="108" height="52" rx="10" />
  <text class="cut" x="662" y="323">지금 인벤토리 열기</text>
  <text class="bad" x="540" y="274">넘침</text>
  <text class="bad" x="540" y="304">텍스트 잘림</text>
  <text class="caption" x="540" y="432">긴 라벨은 고정 크기 컨테이너를 쉽게 깨뜨린다.</text>
</svg>
