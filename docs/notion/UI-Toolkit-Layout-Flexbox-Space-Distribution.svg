<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <title>공간 분배</title>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="74" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">공간 분배</text>
  <text x="640" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">flex-grow 값은 남는 공간을 어떤 비율로 나눌지를 결정한다.</text>

  <rect x="140" y="200" width="1000" height="280" rx="22" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
  <rect x="190" y="255" width="240" height="170" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <rect x="470" y="255" width="480" height="170" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/>
  <rect x="990" y="255" width="100" height="170" rx="18" fill="#fee2e2" stroke="#f87171" stroke-width="3"/>

  <text x="310" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">flex-grow: 1</text>
  <text x="710" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#166534">flex-grow: 2</text>
  <text x="1040" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#991b1b">고정</text>

  <line x1="190" y1="540" x2="950" y2="540" stroke="#0f172a" stroke-width="4"/>
  <polygon points="950,540 928,528 928,552" fill="#0f172a"/>
  <text x="570" y="577" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">남는 공간은 1 : 2 비율로 분배</text>

  <rect x="240" y="624" width="800" height="50" rx="12" fill="#eef2ff"/>
  <text x="640" y="656" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#312e81">Flexbox는 요소를 나란히 두는 것뿐 아니라, 남는 공간을 어떤 비율로 나눌지도 다룬다.</text>
</svg>
