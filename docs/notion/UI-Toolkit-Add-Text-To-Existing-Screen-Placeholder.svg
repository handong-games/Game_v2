<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">UIDocument with added text</title>
  <desc id="desc">A minimal developer-facing visual result showing added text on an existing screen.</desc>

  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .document { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .text { fill: #111827; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .label { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .added-text { fill: #0f172a; font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="960" height="540" />

  <text class="text" x="48" y="52">UIDocument</text>

  <rect class="document" x="48" y="72" width="864" height="420" rx="10" />
  <rect class="screen" x="48" y="72" width="864" height="420" rx="10" />

  <text class="label" x="84" y="110">Existing Screen</text>
  <text class="added-text" x="360" y="288">Added Text</text>
</svg>
