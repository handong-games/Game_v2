<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <title>기본 축</title>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="74" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">기본 축</text>
  <text x="640" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Flexbox는 메인 축과 교차 축을 기준으로 배치를 해석한다.</text>

  <rect x="270" y="170" width="740" height="420" rx="24" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
  <text x="320" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Container</text>

  <rect x="360" y="310" width="150" height="140" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <rect x="560" y="310" width="150" height="140" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/>
  <rect x="760" y="310" width="150" height="140" rx="18" fill="#fde68a" stroke="#f59e0b" stroke-width="3"/>

  <text x="435" y="388" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">A</text>
  <text x="635" y="388" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">B</text>
  <text x="835" y="388" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#92400e">C</text>

  <line x1="340" y1="510" x2="940" y2="510" stroke="#0f172a" stroke-width="5"/>
  <polygon points="940,510 917,498 917,522" fill="#0f172a"/>
  <text x="640" y="550" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">메인 축</text>

  <line x1="1040" y1="250" x2="1040" y2="520" stroke="#7c3aed" stroke-width="5"/>
  <polygon points="1040,250 1028,273 1052,273" fill="#7c3aed"/>
  <text x="1095" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#7c3aed">교차 축</text>

  <rect x="260" y="628" width="760" height="46" rx="12" fill="#eef2ff"/>
  <text x="640" y="657" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#312e81">메인 축은 요소가 쌓이는 방향이고, 교차 축은 그 반대 방향이다.</text>
</svg>
