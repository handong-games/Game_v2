<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">UI Toolkit font basics example</title>
  <desc id="desc">A minimal developer-facing diagram showing text data flowing through a font file to a glyph and finally to rendered text on screen.</desc>

  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .frame { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .title { fill: #111827; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .label { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .body { fill: #334155; font-family: Arial, sans-serif; font-size: 15px; font-weight: 600; }
      .sample-small { fill: #111827; font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .sample-large { fill: #111827; font-family: Georgia, serif; font-size: 34px; font-weight: 700; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .caption { fill: #2563eb; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="bg" width="960" height="540" />

  <text class="title" x="48" y="52">UIDocument</text>

  <rect class="frame" x="48" y="72" width="864" height="420" rx="10" />
  <rect class="screen" x="48" y="72" width="864" height="420" rx="10" />

  <text class="label" x="84" y="110">Font Basics Example</text>

  <rect class="card" x="110" y="180" width="180" height="120" rx="12" />
  <text class="label" x="132" y="208">Text Data</text>
  <text class="sample-small" x="132" y="250">"A"</text>
  <text class="body" x="132" y="278">character string</text>

  <rect class="card" x="390" y="180" width="180" height="120" rx="12" />
  <text class="label" x="412" y="208">Font File</text>
  <text class="body" x="412" y="244">TTF / OTF</text>
  <text class="body" x="412" y="272">glyph data</text>

  <rect class="card" x="670" y="180" width="180" height="120" rx="12" />
  <text class="label" x="692" y="208">Rendered Text</text>
  <text class="sample-large" x="742" y="262">A</text>
  <text class="body" x="692" y="288">glyph on screen</text>

  <line class="arrow" x1="290" y1="240" x2="390" y2="240" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="570" y1="240" x2="670" y2="240" marker-end="url(#arrowhead)" />

  <text class="caption" x="240" y="372">text -&gt; font file -&gt; glyph -&gt; screen</text>
</svg>
