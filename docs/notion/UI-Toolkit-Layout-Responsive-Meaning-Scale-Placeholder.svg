<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Responsive UI scales with screen size</title>
  <desc id="desc">A minimal developer-facing visual showing the same UI at reference scale and a smaller scaled size.</desc>

  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .title { fill: #111827; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .frame { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .panel { fill: #ffffff; stroke: #93c5fd; stroke-width: 1.5; }
      .header { fill: #bfdbfe; stroke: #2563eb; stroke-width: 1.5; }
      .content { fill: #c7d2fe; stroke: #4f46e5; stroke-width: 1.5; }
      .button { fill: #ddd6fe; stroke: #7c3aed; stroke-width: 1.5; }
      .screenLabel { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .elementLabel { fill: #0f172a; font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .caption { fill: #2563eb; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .arrow { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="bg" width="960" height="540" />
  <text class="title" x="48" y="52">UI scales with screen size</text>

  <rect class="frame" x="64" y="96" width="392" height="356" rx="10" />
  <text class="screenLabel" x="104" y="136">reference scale</text>
  <rect class="screen" x="104" y="156" width="136" height="246" rx="10" />
  <rect class="panel" x="122" y="178" width="100" height="180" rx="10" />
  <rect class="header" x="138" y="198" width="68" height="24" rx="6" />
  <text class="elementLabel" x="154" y="214">Header</text>
  <rect class="content" x="138" y="236" width="68" height="56" rx="6" />
  <text class="elementLabel" x="151" y="267">Content</text>
  <rect class="button" x="138" y="308" width="68" height="24" rx="6" />
  <text class="elementLabel" x="155" y="324">Button</text>

  <path class="arrow" d="M258 274 L318 274" />

  <text class="screenLabel" x="334" y="136">scaled UI</text>
  <rect class="screen" x="334" y="176" width="100" height="206" rx="10" />
  <rect class="panel" x="348" y="194" width="72" height="142" rx="8" />
  <rect class="header" x="360" y="210" width="48" height="18" rx="4" />
  <text class="elementLabel" x="373" y="222">H</text>
  <rect class="content" x="360" y="238" width="48" height="42" rx="4" />
  <text class="elementLabel" x="373" y="262">C</text>
  <rect class="button" x="360" y="292" width="48" height="18" rx="4" />
  <text class="elementLabel" x="373" y="304">B</text>

  <text class="caption" x="104" y="422">same UI, smaller overall scale</text>
</svg>
