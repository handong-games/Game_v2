<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EC"/>
      <stop offset="1" stop-color="#E9E1D4"/>
    </linearGradient>
    <linearGradient id="view" x1="472" y1="102" x2="808" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#253956"/>
      <stop offset="1" stop-color="#172233"/>
    </linearGradient>
    <linearGradient id="input" x1="116" y1="386" x2="452" y2="554" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B314D"/>
      <stop offset="1" stop-color="#1C1728"/>
    </linearGradient>
    <linearGradient id="render" x1="828" y1="386" x2="1164" y2="554" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A3520"/>
      <stop offset="1" stop-color="#21160E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowBlue" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L15 8L1 15L5 8L1 1Z" fill="#5477B8"/>
    </marker>
    <marker id="arrowGold" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L15 8L1 15L5 8L1 1Z" fill="#C98A33"/>
    </marker>
    <marker id="arrowPurple" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L15 8L1 15L5 8L1 1Z" fill="#7C62B3"/>
    </marker>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>

  <text x="640" y="66" text-anchor="middle" fill="#2A2E36" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">ArrowWidget Class Relationship</text>
  <text x="640" y="96" text-anchor="middle" fill="#6C6470" font-family="Segoe UI, Arial, sans-serif" font-size="15">AdventureView connects input interpretation and arrow rendering</text>

  <g filter="url(#shadow)">
    <rect x="472" y="132" width="336" height="154" rx="22" fill="url(#view)" stroke="#5F7DAA" stroke-width="2.5"/>
    <text x="640" y="178" text-anchor="middle" fill="#E6EEF9" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">AdventureView.Targeting</text>
    <text x="640" y="211" text-anchor="middle" fill="#B7C8E2" font-family="Segoe UI, Arial, sans-serif" font-size="15">screen coordinator</text>
    <text x="640" y="240" text-anchor="middle" fill="#8394B3" font-family="Segoe UI, Arial, sans-serif" font-size="13">bind slots, track active targeting, call arrow API</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="116" y="398" width="336" height="168" rx="22" fill="url(#input)" stroke="#8C74C8" stroke-width="2.5"/>
    <text x="284" y="444" text-anchor="middle" fill="#F0EAFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">SkillTargetingManipulator</text>
    <text x="284" y="477" text-anchor="middle" fill="#CFC2F2" font-family="Segoe UI, Arial, sans-serif" font-size="15">input state owner</text>
    <text x="284" y="507" text-anchor="middle" fill="#A697CA" font-family="Segoe UI, Arial, sans-serif" font-size="13">PointerDown / Move / Up / Cancel</text>
    <text x="284" y="531" text-anchor="middle" fill="#A697CA" font-family="Segoe UI, Arial, sans-serif" font-size="13">None → Holding → Aiming</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="828" y="398" width="336" height="168" rx="22" fill="url(#render)" stroke="#D49B4B" stroke-width="2.5"/>
    <text x="996" y="444" text-anchor="middle" fill="#FFF0D4" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">ArrowWidget</text>
    <text x="996" y="477" text-anchor="middle" fill="#F0C989" font-family="Segoe UI, Arial, sans-serif" font-size="15">render-only visual element</text>
    <text x="996" y="507" text-anchor="middle" fill="#C9A46D" font-family="Segoe UI, Arial, sans-serif" font-size="13">Show(origin) / Update(target) / Hide()</text>
    <text x="996" y="531" text-anchor="middle" fill="#C9A46D" font-family="Segoe UI, Arial, sans-serif" font-size="13">does not know skill, slot, or target rules</text>
  </g>

  <path d="M518 280C438 338 374 364 310 398" stroke="#7C62B3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <text x="403" y="337" text-anchor="middle" fill="#6A5598" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">adds manipulator to each slot</text>

  <path d="M452 482C576 482 704 482 828 482" stroke="#5477B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="640" y="462" text-anchor="middle" fill="#3F5E99" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">callbacks deliver origin and pointer position</text>

  <path d="M770 280C850 338 914 364 978 398" stroke="#C98A33" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGold)"/>
  <text x="885" y="337" text-anchor="middle" fill="#9A6720" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">calls Show / Update / Hide</text>

  <rect x="470" y="604" width="340" height="52" rx="26" fill="#FFFFFF" stroke="#D2C8BA" stroke-width="2"/>
  <text x="640" y="636" text-anchor="middle" fill="#5F5A54" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Dependency direction: AdventureView knows both. ArrowWidget and Manipulator do not know each other.</text>
</svg>
