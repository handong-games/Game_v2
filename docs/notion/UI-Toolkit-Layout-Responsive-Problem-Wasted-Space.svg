<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">반응형 문제: 넓은 화면에서 공간 낭비</title>
  <desc id="desc">넓은 화면에서 고정 폭 UI가 사용 가능한 공간을 낭비하는 문제를 보여주는 개발자용 시각 자료.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .title { fill: #111827; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .frame { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .label { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .panel { fill: #ffffff; stroke: #93c5fd; stroke-width: 1.5; }
      .card { fill: #bfdbfe; stroke: #2563eb; stroke-width: 1.5; }
      .text { fill: #0f172a; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .bad { fill: #dc2626; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .caption { fill: #475569; font-family: Arial, sans-serif; font-size: 15px; font-weight: 600; }
      .shade { fill: #dbeafe; opacity: 0.6; }
    </style>
  </defs>
  <rect class="bg" width="960" height="540" />
  <text class="title" x="48" y="54">문제 3. 넓은 화면에서 공간을 낭비함</text>

  <rect class="frame" x="64" y="96" width="384" height="360" rx="12" />
  <text class="label" x="92" y="130">넓은 화면에서 의도한 상태</text>
  <rect class="screen" x="100" y="154" width="312" height="248" rx="12" />
  <rect class="panel" x="122" y="186" width="268" height="184" rx="10" />
  <rect class="card" x="144" y="214" width="100" height="128" rx="10" />
  <rect class="card" x="268" y="214" width="100" height="128" rx="10" />
  <text class="text" x="180" y="284">카드 A</text>
  <text class="text" x="304" y="284">카드 B</text>
  <text class="caption" x="100" y="432">콘텐츠가 사용 가능한 폭을 활용한다.</text>

  <rect class="frame" x="512" y="96" width="384" height="360" rx="12" />
  <text class="label" x="540" y="130">고정 폭 레이아웃이 깨진 상태</text>
  <rect class="screen" x="540" y="154" width="328" height="248" rx="12" />
  <rect class="shade" x="540" y="154" width="328" height="248" rx="12" />
  <rect class="panel" x="646" y="186" width="116" height="184" rx="10" />
  <rect class="card" x="664" y="214" width="80" height="50" rx="8" />
  <rect class="card" x="664" y="278" width="80" height="50" rx="8" />
  <text class="text" x="685" y="244">A</text>
  <text class="text" x="685" y="308">B</text>
  <text class="bad" x="540" y="284">빈 공간</text>
  <text class="caption" x="540" y="432">고정 폭 패널은 넓은 화면 대부분을 비워 둔다.</text>
</svg>
