<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">반응형 문제: UI 스케일 불일치</title>
  <desc id="desc">화면 조건에 따라 UI가 너무 작거나 너무 크게 보이는 문제를 보여주는 개발자용 시각 자료.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .title { fill: #111827; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .frame { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .screen { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .label { fill: #1e3a8a; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .panel { fill: #ffffff; stroke: #93c5fd; stroke-width: 1.5; }
      .header { fill: #bfdbfe; stroke: #2563eb; stroke-width: 1.5; }
      .button { fill: #ddd6fe; stroke: #7c3aed; stroke-width: 1.5; }
      .text { fill: #0f172a; font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .bad { fill: #dc2626; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .caption { fill: #475569; font-family: Arial, sans-serif; font-size: 15px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" width="960" height="540" />
  <text class="title" x="48" y="54">문제 5. UI 스케일이 화면 조건에 맞지 않음</text>

  <rect class="frame" x="64" y="96" width="384" height="360" rx="12" />
  <text class="label" x="92" y="130">너무 작음</text>
  <rect class="screen" x="100" y="154" width="312" height="248" rx="12" />
  <rect class="panel" x="250" y="214" width="44" height="80" rx="8" />
  <rect class="header" x="258" y="226" width="28" height="10" rx="3" />
  <rect class="button" x="258" y="252" width="28" height="10" rx="3" />
  <rect class="button" x="258" y="272" width="28" height="10" rx="3" />
  <text class="bad" x="100" y="320">작은 텍스트</text>
  <text class="bad" x="100" y="350">작은 터치 영역</text>
  <text class="caption" x="100" y="432">UI가 읽기 어렵고 누르기 어려워진다.</text>

  <rect class="frame" x="512" y="96" width="384" height="360" rx="12" />
  <text class="label" x="540" y="130">너무 큼</text>
  <rect class="screen" x="540" y="154" width="312" height="248" rx="12" />
  <rect class="panel" x="582" y="176" width="228" height="204" rx="12" />
  <rect class="header" x="604" y="202" width="184" height="38" rx="8" />
  <rect class="button" x="604" y="258" width="184" height="38" rx="8" />
  <rect class="button" x="604" y="314" width="184" height="38" rx="8" />
  <text class="bad" x="540" y="284">낮은 정보 밀도</text>
  <text class="bad" x="540" y="314">화면 활용 저하</text>
  <text class="caption" x="540" y="432">과하게 커진 UI는 화면 공간을 낭비한다.</text>
</svg>
