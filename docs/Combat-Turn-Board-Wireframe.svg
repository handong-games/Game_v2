<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16130f"/>
      <stop offset="1" stop-color="#0d0b09"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252018"/>
      <stop offset="1" stop-color="#17130f"/>
    </linearGradient>

    <linearGradient id="cardPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5eecf"/>
      <stop offset="1" stop-color="#d9c893"/>
    </linearGradient>

    <linearGradient id="skillPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0c9"/>
      <stop offset="1" stop-color="#d9b674"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title {
        font-family: "Arial", sans-serif;
        font-size: 30px;
        font-weight: 700;
        fill: #f5e7bd;
      }

      .label {
        font-family: "Arial", sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #f3dfab;
      }

      .small {
        font-family: "Arial", sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #cfbc91;
      }

      .tiny {
        font-family: "Arial", sans-serif;
        font-size: 15px;
        font-weight: 600;
        fill: #3a2a20;
      }

      .darkText {
        font-family: "Arial", sans-serif;
        font-size: 20px;
        font-weight: 700;
        fill: #3a2a20;
      }

      .effectText {
        font-family: "Arial", sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #563929;
      }

      .note {
        font-family: "Arial", sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #cab88d;
      }

      .costText {
        font-family: "Arial", sans-serif;
        font-size: 17px;
        font-weight: 800;
        fill: #f9ebc7;
      }

      .damage {
        fill: #de6d5e;
      }

      .block {
        fill: #6e9ed8;
      }

      .coinText {
        font-family: "Arial", sans-serif;
        font-size: 28px;
        font-weight: 800;
        fill: #35271f;
      }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="960" y="56" text-anchor="middle" class="title">전투 1턴 시각 프로토타입</text>
  <text x="960" y="88" text-anchor="middle" class="note">동전 결과를 보고, 스킬 순서와 손실을 판단하는 화면</text>

  <g id="before-panel" transform="translate(70 120)">
    <rect x="0" y="0" width="850" height="890" rx="20" fill="url(#panel)" stroke="#6b593c" stroke-width="2"/>
    <text x="40" y="48" class="title">A. 선택 전</text>
    <text x="40" y="80" class="note">몬스터 행동과 동전 결과를 보고 이번 턴 대응을 결정한다.</text>

    <g transform="translate(335 108)" filter="url(#shadow)">
      <rect x="0" y="0" width="180" height="268" rx="14" fill="url(#cardPaper)" stroke="#8b5b46" stroke-width="5"/>
      <rect x="18" y="22" width="144" height="154" rx="10" fill="#7d8f62" opacity="0.85"/>
      <circle cx="90" cy="86" r="42" fill="#53633e"/>
      <rect x="40" y="190" width="100" height="18" rx="9" fill="#3d2b21" opacity="0.8"/>
      <rect x="43" y="193" width="68" height="12" rx="6" fill="#d9504a"/>
      <text x="90" y="230" text-anchor="middle" class="darkText">슬라임</text>
    </g>

    <g transform="translate(536 142)">
      <rect x="0" y="0" width="126" height="70" rx="14" fill="#2c2219" stroke="#e6c98e" stroke-width="2"/>
      <text x="63" y="28" text-anchor="middle" class="small">다음 행동</text>
      <text x="63" y="56" text-anchor="middle" class="label" fill="#ffb6a9">공격 8</text>
    </g>

    <g transform="translate(652 246)">
      <rect x="0" y="0" width="140" height="96" rx="14" fill="#221b15" stroke="#67543b" stroke-width="2"/>
      <text x="70" y="32" text-anchor="middle" class="small">예상 피해</text>
      <text x="70" y="72" text-anchor="middle" class="title" fill="#ff9d88">8</text>
    </g>

    <text x="425" y="438" text-anchor="middle" class="label">동전</text>
    <g transform="translate(292 462)">
      <circle cx="0" cy="0" r="38" fill="#f2d37a" stroke="#604431" stroke-width="4"/>
      <text x="0" y="10" text-anchor="middle" class="coinText">앞</text>
      <circle cx="132" cy="0" r="38" fill="#bba5d8" stroke="#604431" stroke-width="4"/>
      <text x="132" y="10" text-anchor="middle" class="coinText">뒤</text>
      <circle cx="264" cy="0" r="38" fill="#bba5d8" stroke="#604431" stroke-width="4"/>
      <text x="264" y="10" text-anchor="middle" class="coinText">뒤</text>
    </g>

    <g transform="translate(48 594)">
      <text x="0" y="-22" class="label">스킬</text>

      <g transform="translate(0 0)">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="60" height="28" rx="14" fill="#a66639"/>
        <text x="44" y="34" text-anchor="middle" class="costText">앞 1</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">베기</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">피해 5</text>
      </g>

      <g transform="translate(204 0)" opacity="0.42">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="60" height="28" rx="14" fill="#a66639"/>
        <text x="44" y="34" text-anchor="middle" class="costText">앞 2</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">강타</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">피해 12</text>
        <line x1="20" y1="144" x2="156" y2="144" stroke="#5d4030" stroke-width="3"/>
        <text x="88" y="162" text-anchor="middle" class="tiny">동전 부족</text>
      </g>

      <g transform="translate(408 0)">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="60" height="28" rx="14" fill="#6d5d9b"/>
        <text x="44" y="34" text-anchor="middle" class="costText">뒤 1</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">방어</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">방어 5</text>
      </g>

      <g transform="translate(612 0)">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="72" height="28" rx="14" fill="#6c5a45"/>
        <text x="50" y="34" text-anchor="middle" class="costText">아무 1</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">버티기</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">방어 3</text>
      </g>
    </g>
  </g>

  <g id="after-panel" transform="translate(1000 120)">
    <rect x="0" y="0" width="850" height="890" rx="20" fill="url(#panel)" stroke="#6b593c" stroke-width="2"/>
    <text x="40" y="48" class="title">B. 방어 사용 후</text>
    <text x="40" y="80" class="note">뒷면 1개를 방어에 사용해서 예상 피해를 줄인다.</text>

    <g transform="translate(335 108)" filter="url(#shadow)">
      <rect x="0" y="0" width="180" height="268" rx="14" fill="url(#cardPaper)" stroke="#8b5b46" stroke-width="5"/>
      <rect x="18" y="22" width="144" height="154" rx="10" fill="#7d8f62" opacity="0.85"/>
      <circle cx="90" cy="86" r="42" fill="#53633e"/>
      <rect x="40" y="190" width="100" height="18" rx="9" fill="#3d2b21" opacity="0.8"/>
      <rect x="43" y="193" width="68" height="12" rx="6" fill="#d9504a"/>
      <text x="90" y="230" text-anchor="middle" class="darkText">슬라임</text>
    </g>

    <g transform="translate(536 142)">
      <rect x="0" y="0" width="126" height="70" rx="14" fill="#2c2219" stroke="#e6c98e" stroke-width="2"/>
      <text x="63" y="28" text-anchor="middle" class="small">다음 행동</text>
      <text x="63" y="56" text-anchor="middle" class="label" fill="#ffb6a9">공격 8</text>
    </g>

    <g transform="translate(652 226)">
      <rect x="0" y="0" width="140" height="126" rx="14" fill="#221b15" stroke="#67543b" stroke-width="2"/>
      <text x="70" y="30" text-anchor="middle" class="small">방어</text>
      <text x="70" y="64" text-anchor="middle" class="title" fill="#9bc8ff">5</text>
      <text x="70" y="92" text-anchor="middle" class="small">예상 피해</text>
      <text x="70" y="116" text-anchor="middle" class="label" fill="#ffb6a9">3</text>
    </g>

    <text x="425" y="438" text-anchor="middle" class="label">남은 동전</text>
    <g transform="translate(292 462)">
      <circle cx="0" cy="0" r="38" fill="#f2d37a" stroke="#604431" stroke-width="4"/>
      <text x="0" y="10" text-anchor="middle" class="coinText">앞</text>
      <g opacity="0.22">
        <circle cx="132" cy="0" r="38" fill="#bba5d8" stroke="#604431" stroke-width="4"/>
        <text x="132" y="10" text-anchor="middle" class="coinText">뒤</text>
        <line x1="98" y1="-34" x2="166" y2="34" stroke="#f7e8c1" stroke-width="6"/>
      </g>
      <circle cx="264" cy="0" r="38" fill="#bba5d8" stroke="#604431" stroke-width="4"/>
      <text x="264" y="10" text-anchor="middle" class="coinText">뒤</text>
    </g>

    <g transform="translate(48 594)">
      <text x="0" y="-22" class="label">스킬</text>

      <g transform="translate(0 0)">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="60" height="28" rx="14" fill="#a66639"/>
        <text x="44" y="34" text-anchor="middle" class="costText">앞 1</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">베기</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">피해 5</text>
      </g>

      <g transform="translate(204 0)" opacity="0.42">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="60" height="28" rx="14" fill="#a66639"/>
        <text x="44" y="34" text-anchor="middle" class="costText">앞 2</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">강타</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">피해 12</text>
        <line x1="20" y1="144" x2="156" y2="144" stroke="#5d4030" stroke-width="3"/>
        <text x="88" y="162" text-anchor="middle" class="tiny">동전 부족</text>
      </g>

      <g transform="translate(408 0)">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="60" height="28" rx="14" fill="#6d5d9b"/>
        <text x="44" y="34" text-anchor="middle" class="costText">뒤 1</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">방어</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">방어 5</text>
      </g>

      <g transform="translate(612 0)">
        <rect width="176" height="172" rx="12" fill="url(#skillPaper)" stroke="#8b5b46" stroke-width="4"/>
        <rect x="14" y="14" width="72" height="28" rx="14" fill="#6c5a45"/>
        <text x="50" y="34" text-anchor="middle" class="costText">아무 1</text>
        <text x="88" y="84" text-anchor="middle" class="darkText">버티기</text>
        <text x="88" y="122" text-anchor="middle" class="effectText">방어 3</text>
      </g>
    </g>
  </g>

  <g transform="translate(70 1030)">
    <text class="note">읽는 포인트: 동전은 성공/실패가 아니라 행동 자원이다. 스킬 하나를 쓰면 남은 선택지가 바뀌고, 예상 피해도 즉시 바뀐다.</text>
  </g>
</svg>
